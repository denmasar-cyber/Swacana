# ─── SWACANA CI/CD ─────────────────────────────────────────────────────────
#
# On push/PR → typecheck + test CLI
# On tag v*  → build + publish to npm (Trusted Publishing via OIDC)
#
# Setup (once, in npm):
#   1. Go to https://www.npmjs.com/settings/swacana/packages
#   2. Add "GitHub Actions" as Trusted Publisher
#      - Organization:  your-github-org
#      - Repository:    swacana
#      - Workflow:      ci.yml
#
# ────────────────────────────────────────────────────────────────────────────

name: CI/CD

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]

# ─── Permissions ───────────────────────────────────────────────────────────
# id-token: write is scoped ONLY to the publish job for security.
# The 'test' job only needs contents: read.

permissions:
  contents: read

# ─── Jobs ──────────────────────────────────────────────────────────────────

jobs:

  # ── 1. Typecheck & Test ─────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: cli/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

  # ── 2. Publish to npm (only on version tags) ────────────────────────────
  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: cli

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Verify version tag matches package.json
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(npm pkg get version | tr -d '"')
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "❌ Tag v$TAG_VERSION doesn't match package.json v$PKG_VERSION"
            exit 1
          fi
          echo "✅ Tag v$TAG_VERSION matches package.json v$PKG_VERSION"

      - name: Build
        run: npm run build

      # Uses OIDC (Trusted Publishing) — no NPM_TOKEN needed.
      # Provenance is generated automatically for public packages
      # from public repos using Trusted Publishing.
      - name: Publish to npm
        run: npm publish
